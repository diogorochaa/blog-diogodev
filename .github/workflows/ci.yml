name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Quality checks
        run: npm run check

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Vercel Production Deploy Hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl --fail --show-error --silent -X POST "$VERCEL_DEPLOY_HOOK_URL"

      - name: Skip deploy when hook is missing
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL == '' }}
        run: echo "VERCEL_DEPLOY_HOOK_URL secret is not configured. Skipping deploy."
